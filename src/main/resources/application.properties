spring.application.name=trackFlow

spring.cloud.gateway.discovery.locator.enabled=true

spring.cloud.gateway.routes[0].id=KPI-SERVICE
spring.cloud.gateway.routes[0].uri=lb://kpi-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/kpi-service/**

spring.cloud.gateway.routes[1].id=TASK-SERVICE
spring.cloud.gateway.routes[1].uri=lb://task-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/task-service/**

spring.cloud.gateway.routes[2].id=CHAT-SERVICE
spring.cloud.gateway.routes[2].uri=lb://chat-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/chat-service/**

spring.cloud.gateway.routes[3].id=USER-SERVICE
spring.cloud.gateway.routes[3].uri=lb://user-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/user-service/**

eureka.instance.hostname=trackFlow
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

eureka.instance.prefer-ip-address=false
eureka.instance.home-page-url=http://localhost:8009

spring.main.web-application-type=reactive
spring.cloud.config.enabled=false
server.port=8009
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.socket=DEBUG
logging.level.org.springframework.cloud.gateway=DEBUG